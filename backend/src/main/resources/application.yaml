server:
  port: ${PORT:8080}

spring:
  application:
    name: muskets
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/muskets;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  h2:
    console:
      enabled: false  # CVE-2021-42392 — never expose in non-dev profiles
  jpa:
    hibernate:
      ddl-auto: update  # Auto-creates missing tables if Flyway is skipped
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

# Detection engine thresholds — tunable without code changes
detection:
  threshold:
    z-score: 3.0
    negative-streak: 5
    velocity-window-seconds: 60
    velocity-count: 5
    p1-score: 8.0
    p2-score: 5.0
    account-age-risk-days: 30

# Application configuration - CORS, AI and rate limiting
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  ai:
    provider: ${AI_PROVIDER:groq}
    api-key: ${GROQ_API_KEY:${AI_API_KEY:MOCK_KEY}}
    model: ${AI_MODEL:llama-3.1-8b-instant}
  investigation:
    reanalyze-rate-limit-per-day: ${REANALYZE_RATE_LIMIT:200}

