services:
  db:
    image: postgres:17-bookworm
    environment:
      POSTGRES_DB: muskets
      POSTGRES_USER: muskets_user
      POSTGRES_PASSWORD: muskets_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muskets_user -d muskets"]
      interval: 5s
      timeout: 5s
      retries: 5

  muskets:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/muskets
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: muskets_user
      SPRING_DATASOURCE_PASSWORD: muskets_password
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_PROFILES_ACTIVE: default

volumes:
  postgres-data: