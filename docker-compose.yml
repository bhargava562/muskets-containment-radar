services:
  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      HOST: 0.0.0.0
      PORT: 5173
      VITE_BACKEND_URL: http://localhost:3001
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  backend_node_modules:
  frontend_node_modules: